name: CI

# The quality gate for every change. Runs the same four gates as
# `pnpm lint && pnpm typecheck && pnpm test && pnpm build` plus the Playwright
# smoke suite. Must be green before a PR can merge. Gates both integration
# branches: feature PRs into `develop` and the periodic `develop` -> `master`
# release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

# Only the latest run per branch/PR matters; cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Enforce the env contract before anything else - keeps .env.example in
      # lockstep with .env.schema and validates required keys/patterns in any real .env.
      - name: Validate env schema
        run: sh scripts/check-env.sh

      # pnpm before setup-node so the Node cache can key off the pnpm store.
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm test:e2e
