name: CodeQL

# Semantic security analysis via GitHub CodeQL. Findings surface under
# Security > Code scanning. Runs on the integration branches plus a weekly
# scheduled scan, so advisories published after a merge are still caught.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]
  schedule:
    # Weekly, Monday 06:17 UTC (off the hour to dodge the cron spike).
    - cron: "17 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Upload results to code scanning; the reads are required for private repos.
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          category: "/language:${{ matrix.language }}"
