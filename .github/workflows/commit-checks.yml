name: Commit checks

# Conventional-Commits enforcement (see CONTRIBUTING.md): lint every commit in a PR
# and the PR title itself, which becomes the squash-merge subject and feeds the
# changelog. Keeps the commit history machine-readable for release tooling.

on:
  pull_request:
    # `edited` so fixing the PR title re-runs the title check.
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: commit-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    name: PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    # Release PRs (develop -> master) aggregate the entire develop history, which
    # includes commits predating Conventional-Commits enforcement. Per-commit
    # linting can never pass on that range and rewriting shared history is
    # off-limits, so skip it for PRs targeting master; the PR-title check above
    # (which becomes the merge subject) still runs.
    if: github.event.pull_request.base.ref != 'master'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so commitlint can lint the whole base..head commit range.
          fetch-depth: 0

      - name: Provide a default commitlint config
        # Honour a project's own config when present; otherwise fall back to the
        # Conventional Commits ruleset. Written at CI time, never committed.
        run: |
          if ! ls commitlint.config.* .commitlintrc* >/dev/null 2>&1; then
            echo "module.exports = { extends: ['@commitlint/config-conventional'] };" > commitlint.config.js
          fi

      - name: Lint commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
