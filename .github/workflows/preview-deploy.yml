name: Preview deploy

# Provider-neutral preview environment for every pull request - the GitHub twin of
# the .gitlab-ci.yml `deploy:preview` job. On each PR it deploys an ephemeral
# preview and comments the URL; when the PR closes it tears the preview down. The
# surrounding plumbing (a GitHub Deployment environment, an upserted PR comment,
# concurrency and cleanup) is wired - only the deploy/teardown steps are TODOs, so
# point them at your host (Vercel, Netlify, GitHub Pages, Fly, ...).

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  # One preview per PR; a new push supersedes the in-flight deploy.
  group: preview-${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # comment the preview URL on the PR
  deployments: write # record the preview environment

jobs:
  deploy:
    name: Deploy preview
    # Skip on close - that path is handled by the teardown job below.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: preview-pr-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Add your build here (mirror ci.yml's language setup + build), then deploy
      # its output below.
      - name: Deploy
        id: deploy
        run: |
          echo "TODO: build and deploy a preview for PR #${{ github.event.number }}"
          # e.g. url=$(npx vercel deploy --prebuilt --token "$VERCEL_TOKEN")
          echo "url=https://preview-pr-${{ github.event.number }}.preview.example.com" >> "$GITHUB_OUTPUT"

      - name: Comment the preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const marker = "<!-- preview-deploy -->";
            const body = `${marker}\nPreview for this PR: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  teardown:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview
        run: |
          echo "TODO: tear down the preview for PR #${{ github.event.number }}"
