# Run the app in a container locally, close to how it runs in production but
# wired for development. `docker compose up --build` builds the Dockerfile in this
# directory and starts the app on port 3000.
#
# Secrets come from a local .env (gitignored) via env_file - never hard-code them
# here. Note NEXT_PUBLIC_* values are baked in at build time, so a change to one
# needs a rebuild, not just a restart. Need a database too? The `postgres` flavor
# ships a ready db service (`devblueprint init ... --flavor postgres`); uncomment
# depends_on below to wait on it.
services:
  app:
    build: .
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # PostgreSQL for local development (postgres flavor). Credentials default to
  # dev values; override POSTGRES_* in .env. Point DATABASE_URL at this service.
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
