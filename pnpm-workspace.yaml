# pnpm blocks dependency build scripts by default. Allowlist the ones we trust
# here (pnpm 11 `allowBuilds` map), otherwise `pnpm install` exits non-zero with
# ERR_PNPM_IGNORED_BUILDS and fails the CI quality gate.
# unrs-resolver builds the native binding eslint's import resolver loads.
# esbuild installs its platform binary (used by drizzle-kit); sharp builds the
# native image pipeline Next.js uses for image optimization.
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Force the vulnerable dev-only esbuild that drizzle-kit's legacy
# @esbuild-kit/esm-loader drags in (esbuild@0.18.20, GHSA-67mh-4wv8-2f99, a
# dev-server-only issue) up to a patched line, so dependency review passes.
# drizzle-kit already runs its own esbuild@0.25.x + tsx directly; the legacy
# loader is vestigial, so bumping it does not affect migrations.
overrides:
  esbuild@<0.25.0: '>=0.25.0'
