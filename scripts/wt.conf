# wt.conf - worktree config for a Next.js/pnpm project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Install dependencies in a freshly created worktree so it is immediately usable.
wt_post_create() {
  ( cd "$1" && pnpm install --prefer-offline )
}
